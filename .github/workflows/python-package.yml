name: Python package

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  wheel:
    name: Build wheel
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Test installed wheel
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          import qmscalc

          result = qmscalc.calculate_voltages(
              r0_mm=15.0,
              target_m_over_q_amu_per_z=250.0,
              resolution=250.0,
              rf_frequency_mhz=1.0,
          )

          assert result["rf_voltage_v"] > 0.0
          assert result["dc_voltage_v"] > 0.0
          print(result)
          PY

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: qmscalc-${{ matrix.python-version }}-wheel
          path: dist/*.whl
