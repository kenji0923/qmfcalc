name: Python package

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  wheel:
    name: Build wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip build
          rm -rf wheelhouse
          python -m build --wheel --outdir wheelhouse

      - name: Test installed wheel
        shell: bash
        run: |
          python -m pip install wheelhouse/*.whl
          python - <<'PY'
          import qmfcalc

          result = qmfcalc.calculate_voltages(
              r0_mm=15.0,
              target_m_over_q_amu_per_z=250.0,
              resolution=250.0,
              rf_frequency_mhz=1.0,
          )

          assert result["rf_voltage_v"] > 0.0
          assert result["dc_voltage_v"] > 0.0
          print(result)
          PY

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: qmfcalc-${{ matrix.os }}-py${{ matrix.python-version }}-wheel
          path: wheelhouse/*.whl
