name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: qmfcalc-sdist
          path: dist/*.tar.gz

  wheels:
    name: Build wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir dist

      - name: Test installed wheel
        shell: bash
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          import qmfcalc

          result = qmfcalc.calculate_voltages(
              r0_mm=15.0,
              target_m_over_q_amu_per_z=250.0,
              resolution=250.0,
              rf_frequency_mhz=1.0,
          )

          assert result["rf_voltage_v"] > 0.0
          assert result["dc_voltage_v"] > 0.0
          print(result)
          PY

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: qmfcalc-${{ matrix.os }}-py3.13-wheel
          path: dist/*.whl

  publish:
    name: Publish distributions to PyPI
    runs-on: ubuntu-latest
    needs: [sdist, wheels]
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: qmfcalc-*
          merge-multiple: true
          path: dist

      - name: List distributions
        run: ls -l dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
