name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: qmfcalc-sdist
          path: dist/*.tar.gz

  wheels:
    name: Build wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheel
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_BUILD: "cp312-* cp313-*"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_SKIP: "*-musllinux_*"
          CIBW_TEST_COMMAND: >-
            python -c "import math, qmfcalc; r = qmfcalc.calculate_voltages(15.0, 250.0, 250.0, 1.0); inv = qmfcalc.calculate_mass_resolution(15.0, r['rf_voltage_v'], r['dc_voltage_v'], 1.0); assert r['rf_voltage_v'] > 0.0; assert r['dc_voltage_v'] > 0.0; assert math.isclose(inv['m_over_q_amu_per_z'], 250.0, rel_tol=1e-6); assert math.isclose(inv['resolution'], 250.0, rel_tol=1e-6); print(r); print(inv)"
        with:
          output-dir: dist

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: qmfcalc-${{ matrix.os }}-wheels
          path: dist/*.whl

  publish:
    name: Publish distributions to PyPI
    runs-on: ubuntu-latest
    needs: [sdist, wheels]
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: qmfcalc-*
          merge-multiple: true
          path: dist

      - name: List distributions
        run: ls -l dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
